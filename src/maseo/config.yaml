ontology:
  base_uri: "http://www.semanticweb.org/myontology#"

model:
  provider: "openrouter" 
  max_tokens: 16384
  temperature: 0.0        

  ollama:
    id: "qwen3.5:27b"


  deepseek:
    id: "deepseek-reasoner"
    api_key: ""

    openrouter:
    id: "google/gemma-4-31b-it"
    api_key: ""

agents:
  default_retries: 3

oops:
  api_url: "https://oops.linkeddata.es/rest"
  request_template: "./templates/oops_request_template.xml"

hermit:
  jar_path: "./hermit/HermiT.jar"
  temp_file: "temp.xml"

prompts:
  ontology_generation:
    name: "Ontology Generation Agent"
    role: "Ontology specialist"
    instructions: |
          You are an experienced knowledge engineer modelling a specific domain.
          Based on the provided competency questions, produce the ontology source code following the OWL format.
          Make it as complete as possible, focusing on concepts, properties, domains and ranges applicable from the competency questions.
          Generate the ontology in XML format.

          The base URI of the ontology is: {base_uri}
          Note: this base URI already ends with '#'. When constructing any URI you must
          append the local name DIRECTLY to the base URI — do NOT add another '#'.
          Correct:   rdf:resource="{base_uri}Wine"
          Incorrect: rdf:resource="{base_uri}#Wine"     (this produces '##Wine')
          Incorrect: rdf:resource="#Wine"               (missing the base URI entirely)
          Always use this exact URI when constructing rdf:about or rdf:resource values.
          For example, a class named "Wine" must be written as:
            rdf:about="{base_uri}Wine"
          and an axiom referencing it must use:
            rdf:resource="{base_uri}Wine"
          Never use placeholder text or template syntax in URIs — always use the literal base URI shown above.

          For the 'Axiom' field of each entity, provide a raw RDF/XML fragment that will be embedded
          directly inside the OWL element. For owl:Class entities use <rdfs:subClassOf>, <owl:disjointWith>,
          <owl:equivalentClass>, etc. For properties use <owl:inverseOf>, <rdfs:subPropertyOf>, etc.
          The same URI rule applies INSIDE the Axiom field — never write '#LocalName' or '{base_uri}#LocalName'.
          Example value for Axiom:
          "<rdfs:subClassOf rdf:resource='{base_uri}RegulatedZone'/>\n  <owl:disjointWith rdf:resource='{base_uri}LowEmissionZone'/>"
          If an Axiom is not <rdfs:subClassOf> or <owl:disjointWith>, please leave them as comments.
          Follow the instruction as: <!-- Axiom: XXX -->
    prompt_template: |
          All competency questions are provided here:
          {competency_questions}

          Please produce an OWL ontology that answers all of these questions.
 

  syntax_repair:
    name: "Syntax Repair Agent"
    role: "Ontology specialist"
    instructions: |
      You are an experienced knowledge engineer. Now please fix syntax errors in the provided RDF/XML code.
    prompt_template: |
      I have an OWL ontology with syntax errors. Please fix the syntax issues.

      Ontology:
      {ontology}

      Error message:
      {error}

      Please return ONLY the corrected RDF/XML code.

  logical_consistency:
    name: "Logical Consistency Agent"
    role: "Ontology Debugging specialist"
    instructions: |
      You are an experienced ontology engineer. Analyse the HERMIT reasoner report and the ontology
      source code, debug it and generate the updated version.
      For the 'Axiom' field of each entity, provide a raw RDF/XML fragment to embed directly inside the OWL element.
      Make sure the logical and semantic consistency in the Axiom field.
    prompt_template: |
      I have an OWL ontology with consistency errors according to the Hermit reasoner.

      Ontology:
      {ontology}

      Hermit error report:
      {hermit_report}

      Please analyze and fix the consistency issues.

  pitfall_resolution:
    name: "Pitfall Resolution Agent"
    role: "Ontology Debugging specialist"
    instructions: |
      You are an experienced ontology engineer. Analyse the OOPS pitfall report and the ontology
      source code, debug it and generate the updated version.
      Please carefully analyse the OOPS report and the source code for the ontology,
      debug the source code ontology and generate the updated version of the ontology.
    prompt_template: |
      I have an OWL ontology with the following OOPS pitfall report.

      Ontology:
      {ontology}

      OOPS pitfall report:
      {pitfalls}

      Please analyze and fix the identified pitfalls.